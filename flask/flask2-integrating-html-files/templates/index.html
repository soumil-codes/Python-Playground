<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Simple Landing Page</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      line-height: 1.6;
    }

    header {
      background: #4f46e5;
      color: white;
      padding: 20px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header h1 {
      font-size: 24px;
    }

    nav a {
      color: white;
      margin-left: 20px;
      text-decoration: none;
      font-weight: bold;
    }

    .hero {
      height: 90vh;
      background: linear-gradient(to right, #6366f1, #3b82f6);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
    }

    .hero h2 {
      font-size: 48px;
      margin-bottom: 20px;
    }

    .hero p {
      font-size: 18px;
      margin-bottom: 30px;
    }

    .btn {
      padding: 12px 25px;
      background: white;
      color: #3b82f6;
      border: none;
      border-radius: 5px;
      font-size: 16px;
      cursor: pointer;
      text-decoration: none;
    }

    .features {
      padding: 60px 40px;
      display: flex;
      justify-content: space-around;
      text-align: center;
    }

    .feature {
      max-width: 300px;
    }

    .feature h3 {
      margin-bottom: 10px;
    }

    footer {
      background: #111827;
      color: white;
      text-align: center;
      padding: 20px;
    }
  </style>
</head>
<body>

  <header>
    <h1>MySite</h1>
    <nav>
      <a href="#">Home</a>
      <a href="#">Features</a>
      <a href="#">Contact</a>
    </nav>
  </header>

  <section class="hero">
    <div>
      <h2>Welcome to My Landing Page</h2>
      <p>A simple, clean and modern landing page using HTML & CSS.</p>
      <a href="/" class="btn">Get Started</a>
    </div>
  </section>

  <section class="features">
    <div class="feature">
      <h3>Fast</h3>
      <p>Optimized for speed and performance.</p>
    </div>
    <div class="feature">
      <h3>Responsive</h3>
      <p>Looks great on all devices.</p>
    </div>
    <div class="feature">
      <h3>Simple</h3>
      <p>Easy to understand and modify.</p>
    </div>
  </section>

  <footer>
    <p>© 2026 MySite. All rights reserved.</p>
  </footer>

</body>
</html>
